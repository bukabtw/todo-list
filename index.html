<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Список дел на Vue 3</title>
<script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
  background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
  min-height: 100vh;
  padding: 20px;
  display: flex;
  align-items: center;
  justify-content: center;
}

#app {
  max-width: 600px;
  width: 100%;
  background: white;
  border-radius: 16px;
  padding: 30px;
  box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
}

h1 {
  text-align: center;
  color: #333;
  margin-bottom: 10px;
  font-size: 2rem;
}

.subtitle {
  text-align: center;
  color: #666;
  margin-bottom: 30px;
  font-size: 0.9rem;
}

.input-section {
  display: flex;
  gap: 10px;
  margin-bottom: 25px;
}

#new-task-title {
  flex: 1;
  padding: 12px 16px;
  border: 2px solid #e0e0e0;
  border-radius: 8px;
  font-size: 1rem;
  transition: border-color 0.3s;
}

#new-task-title:focus {
  outline: none;
  border-color: #667eea;
}

#new-task-title::placeholder {
  color: #aaa;
}

.add-btn {
  padding: 12px 24px;
  background: #667eea;
  color: white;
  border: none;
  border-radius: 8px;
  font-size: 1rem;
  cursor: pointer;
  transition: background 0.3s;
}

.add-btn:hover:not(:disabled) {
  background: #5a6fd6;
}

.add-btn:disabled {
  background: #ccc;
  cursor: not-allowed;
}

.stats {
  display: flex;
  justify-content: space-between;
  padding: 15px;
  background: #f8f9fa;
  border-radius: 8px;
  margin-bottom: 20px;
  font-size: 0.9rem;
  color: #666;
}

.stats span {
  font-weight: 600;
}

.stats .completed-count {
  color: #28a745;
}

.stats .pending-count {
  color: #ffc107;
}

.task-list {
  list-style: none;
}

.task-item {
  display: flex;
  align-items: center;
  padding: 15px;
  background: #f8f9fa;
  border-radius: 8px;
  margin-bottom: 10px;
  transition: transform 0.2s, box-shadow 0.2s;
}

.task-item:hover {
  transform: translateX(5px);
  box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
}

.task-item .checkbox {
  width: 24px;
  height: 24px;
  border: 2px solid #667eea;
  border-radius: 50%;
  margin-right: 15px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: background 0.3s;
  flex-shrink: 0;
}

.task-item .checkbox:hover {
  background: #e8e8ff;
}

.task-item .checkbox.checked {
  background: #667eea;
}

.task-item .checkbox.checked::after {
  content: '✓';
  color: white;
  font-weight: bold;
}

.task-title {
  flex: 1;
  font-size: 1rem;
  color: #333;
}

.task-item.completed .task-title {
  text-decoration: line-through;
  color: #aaa;
}

.remove-btn {
  padding: 6px 12px;
  background: #dc3545;
  color: white;
  border: none;
  border-radius: 6px;
  font-size: 0.85rem;
  cursor: pointer;
  transition: background 0.3s;
  margin-left: 10px;
}

.remove-btn:hover {
  background: #c82333;
}

.empty-message {
  text-align: center;
  padding: 40px 20px;
  color: #999;
  font-size: 1.1rem;
}

.empty-message .icon {
  font-size: 3rem;
  margin-bottom: 10px;
}
</style>
</head>
<body>
<div id="app">
  <h1>📝 {{ appTitle }}</h1>
  <p class="subtitle">Всего задач: {{ tasks.length }}</p>

  <div class="input-section">
    <input 
      type="text" 
      id="new-task-title"
      v-model="newTaskTitle" 
      placeholder="Введите название задачи..."
      @keyup.enter="addTask"
    >
    <button class="add-btn" :disabled="!newTaskTitle.trim()" @click="addTask">
      Добавить
    </button>
  </div>

  <div class="stats" v-if="tasks.length > 0">
    <span class="completed-count">✅ Выполнено: {{ completedCount }}</span>
    <span class="pending-count">⏳ Осталось: {{ pendingCount }}</span>
  </div>

  <div v-if="tasks.length === 0" class="empty-message">
    <div class="icon">📋</div>
    <p>Список пуст. Добавьте первую задачу!</p>
  </div>

  <ul class="task-list" v-else>
    <li 
      v-for="task in tasks" 
      :key="task.id" 
      class="task-item"
      :class="{ completed: task.completed }"
    >
      <div class="checkbox" 
           :class="{ checked: task.completed }"
           @click="toggleTask(task.id)">
      </div>
      
      <span class="task-title">{{ task.title }}</span>
      
      <button class="remove-btn" @click="removeTask(task.id)">
        Удалить
      </button>
    </li>
  </ul>
</div>

<script>
const { createApp } = Vue

createApp({
  data() {
    return {
      appTitle: 'Мой список дел',
      tasks: [
        { id: 1, title: 'Пройти курс Vue.js 3', completed: false },
        { id: 2, title: 'Изучить Composition API', completed: true },
        { id: 3, title: 'Создать своё первое приложение', completed: false }
      ],
      newTaskTitle: ''
    }
  },

  computed: {
    completedCount() {
      return this.tasks.filter(task => task.completed).length
    },
    pendingCount() {
      return this.tasks.filter(task => !task.completed).length
    }
  },

  methods: {
    addTask() {
      const title = this.newTaskTitle.trim()
      if (!title) return

      const newTask = {
        id: Date.now(),
        title: title,
        completed: false
      }

      this.tasks.push(newTask)
      this.newTaskTitle = ''
    },

    toggleTask(id) {
      const task = this.tasks.find(t => t.id === id)
      if (task) {
        task.completed = !task.completed
      }
    },

    removeTask(id) {
      const index = this.tasks.findIndex(t => t.id === id)
      if (index !== -1) {
        this.tasks.splice(index, 1)
      }
    }
  }
}).mount('#app')
</script>
</body>
</html>
